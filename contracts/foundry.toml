[profile.default]
solc_version        = "0.8.22"
evm_version         = "shanghai"
optimizer           = true
optimizer_runs      = 200
via_ir              = true

src                 = "src"
out                 = "out"
libs                = ["lib"]
remappings          = ["@openzeppelin/=lib/openzeppelin-contracts/"]

# Push Chain Testnet configuration
[rpc_endpoints]
push_testnet        = "https://evm.donut.rpc.push.org/"

# BlockScout doesn't require an API key but Foundry expects a key field. Use
# `--verify --verifier blockscout --verifier-url <url>` on `forge script`, or
# rely on the alias below by passing `--verify` only (uncomment to enable).
# [etherscan]
# push_testnet        = { key = "blockscout", url = "https://donut.push.network/api", chain = 42101 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options