<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PUSD — Redirecting…</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // GitHub Pages SPA fallback — rewrite /path?foo=bar into /#/path?foo=bar
      // so index.html can re-enter React Router on load. The companion snippet
      // in index.html undoes the rewrite.
      (function () {
        var pathSegmentsToKeep = 0; // set to 1 when deploying to a subpath
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
